name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *"

  workflow_dispatch:

  push:
    branches:
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00aaff&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39&color_bg=#0d1117
            dist/github-contribution-grid-snake-dark.svg?color_snake=#00aaff&color_dots=#0d1117,#0d47a1,#1565c0,#1e88e5,#42a5f5&color_bg=#0d1117

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
